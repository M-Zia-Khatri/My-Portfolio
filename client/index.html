<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
    <style>
      #root {
        opacity: 0;
        filter: blur(4px);
        transition: opacity 320ms ease, filter 320ms ease;
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        background: linear-gradient(160deg, #213448 0%, #1a2a38 70%, #101a24 100%);
        color: #eaf3ff;
        opacity: 1;
        transition: opacity 420ms ease, filter 420ms ease;
        filter: blur(0);
        pointer-events: all;
      }

      .loader-content {
        text-align: center;
      }

      .loader-content h1 {
        margin: 0;
        font-size: clamp(1.5rem, 3.5vw, 2.25rem);
        letter-spacing: 0.08em;
        animation: loaderFade 420ms ease-out forwards;
      }

      .loader-content p {
        margin: 0.5rem 0 0;
        font-size: clamp(0.88rem, 2.1vw, 1rem);
        color: #9ec4e0;
        animation: loaderFade 520ms ease-out forwards;
      }

      @keyframes loaderFade {
        from {
          opacity: 0;
          transform: translate3d(0, 8px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" aria-hidden="true">
      <div class="loader-content">
        <h1>M. Zia Khatri</h1>
        <p>Frontend Developer</p>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
