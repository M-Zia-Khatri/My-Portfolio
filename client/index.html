<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
    <script>
      (() => {
        const key = 'initial-loader-seen';
        try {
          if (window.localStorage.getItem(key) === 'true') {
            document.documentElement.setAttribute('data-skip-initial-loader', 'true');
          } else {
            window.localStorage.setItem(key, 'true');
          }
        } catch {
          // no-op: private mode or storage restrictions
        }
      })();
    </script>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        background: linear-gradient(160deg, #213448 0%, #1a2a38 70%, #101a24 100%);
        color: #eaf3ff;
        opacity: 1;
        transition: opacity 320ms ease;
      }

      html[data-skip-initial-loader='true'] #initial-loader {
        display: none;
      }

      .loader-content {
        text-align: center;
      }

      .loader-content h1 {
        margin: 0;
        font-size: clamp(1.5rem, 3.5vw, 2.25rem);
        letter-spacing: 0.08em;
        animation: loaderFade 420ms ease-out forwards;
      }

      .loader-content p {
        margin: 0.5rem 0 0;
        font-size: clamp(0.88rem, 2.1vw, 1rem);
        color: #9ec4e0;
        animation: loaderFade 520ms ease-out forwards;
      }

      @keyframes loaderFade {
        from {
          opacity: 0;
          transform: translate3d(0, 8px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" aria-hidden="true">
      <div class="loader-content">
        <h1>M. Zia Khatri</h1>
        <p>Frontend Developer</p>
      </div>
    </div>

    <div id="root"></div>

    <script>
      (() => {
        const removeLoader = () => {
          const loader = document.getElementById('initial-loader');
          if (!loader) return;

          loader.style.opacity = '0';
          loader.style.pointerEvents = 'none';
          window.setTimeout(() => loader.remove(), 340);
        };

        const maybeRemoveLoader = () => {
          const root = document.getElementById('root');
          if (!root || root.childElementCount === 0) return false;
          removeLoader();
          return true;
        };

        if (!document.documentElement.hasAttribute('data-skip-initial-loader')) {
          const observer = new MutationObserver(() => {
            if (maybeRemoveLoader()) observer.disconnect();
          });

          const root = document.getElementById('root');
          if (root) observer.observe(root, { childList: true });

          window.addEventListener('load', () => {
            window.setTimeout(removeLoader, 120);
            observer.disconnect();
          });
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
