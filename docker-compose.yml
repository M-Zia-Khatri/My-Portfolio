version: '3.9'

services:
  # Database
  db:
    image: mariadb:11
    container_name: portfolio-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - '${DATABASE_PORT}:3306'
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - portfolio-network
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Migration
  migrator:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: builder
    container_name: portfolio-migrator
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "
        echo '🚀 Running Prisma migrations...' &&
        pnpm exec prisma migrate deploy &&
        echo '✅ Migrations completed'
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - portfolio-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '${PORT}:5000'
    command: pnpm start
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - portfolio-network

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: portfolio-client
    restart: unless-stopped
    ports:
      - '${CLIENT_PORT}:80'
    depends_on:
      - server
    networks:
      - portfolio-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    name: portfolio-db-data
  redis-data:
    name: portfolio-redis-data

networks:
  portfolio-network:
    driver: bridge