services:
  db:
    image: mariadb:11
    container_name: portfolio-db-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: portfolio
      MYSQL_USER: portfolio_user
      MYSQL_PASSWORD: portfolio_pass
    ports:
      - '3306:3306'
    volumes:
      - db-data-local:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis-local
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data-local:/data

volumes:
  db-data-local:
    name: portfolio-db-local
  redis-data-local:
    name: portfolio-redis-local
